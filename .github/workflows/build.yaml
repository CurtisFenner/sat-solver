name: Build

on:
  push:
    branches: "*"
    tags: "v*"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
          node-version: 24
    - uses: pnpm/action-setup@v6
    - run: pnpm install --frozen-lockfile
    - run: pnpm run build
    - run: pnpm run test
    - name: Build publishable NPM artifact
      run:
        ./ci/build-publishable.sh "./publishable/" "${GITHUB_REF_NAME#v}"
    - name: Test publishable NPM artifact
      run:
        npm install ../../publishable/ && tsc && node example.ts
      working-directory: ./ci/test-publishable
    - name: |-
        ${{ case(
          github.ref_type == 'tag',
            format('Publish tag {0} to NPM', github.ref_name),
          '(Skipping publish to NPM for non-tag event)'
        )}}
      if: github.ref_type == 'tag'
      run:
          npm publish --public --provenance
      working-directory: ./publishable/
      env:
        NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

permissions:
  id-token: write
